name: Deploy Flutter Web to Firebase Hosting

on:
  pull_request:
    branches:
      - master
    types:
      - closed
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # タグ履歴をすべて取得するために fetch-depth: 0 が必須
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. バージョン情報を抽出するロジック
      - name: Extract version info
        id: vars
        run: |
          # 最新のタグ (v1.1.0等) を取得。タグがない場合は 0.0.0 を使用
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/v//' || echo "0.0.0")
          echo "VERSION=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Using version: $LATEST_TAG"

      - name: Install Flutter dependencies
        run: flutter pub get

      # 2. ビルド引数に動的な値を注入
      - name: Build Flutter Web (release)
        run: |
          flutter build web --release \
            --build-name=${{ steps.vars.outputs.VERSION }} \
            --build-number=${{ github.run_number }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAME_MEMBER_GENERATOR }}'

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project game-member-generator