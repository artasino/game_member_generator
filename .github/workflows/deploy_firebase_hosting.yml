name: Build and Deploy

on:
  pull_request:
    branches:
      - master
    types:
      - closed
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
      - name: Extract version info
        id: vars
        run: |
          # 最新のタグ (v1.1.0等) を取得。タグがない場合は 0.0.0 を使用
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/v//' || echo "0.0.0")
          echo "VERSION=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Using version: $LATEST_TAG"

  deploy-web:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Web (release)
        run: |
          flutter build web --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ github.run_number }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAME_MEMBER_GENERATOR }}'

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project game-member-generator

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows build
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: |
          flutter build windows --release `
            --build-name=${{ needs.version.outputs.version }} `
            --build-number=${{ github.run_number }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game_member_generator_windows
          path: build/windows/x64/runner/Release

      - name: Zip build
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir release
          xcopy build\windows\x64\runner\Release\* release\ /E /I
          Compress-Archive -Path release\* -DestinationPath game_member_generator_windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: game_member_generator_windows.zip
